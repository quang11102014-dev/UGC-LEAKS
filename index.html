<!DOCTYPE html>
<html lang="en">
<head>

<title>UGC Free Limited Tracker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* LOADING */

#loading{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:.5s;
}

.logo{
font-size:42px;
font-weight:900;
letter-spacing:3px;
margin-bottom:30px;
}

.loader{
display:flex;
gap:12px;
}

.loader div{
width:18px;
height:18px;
background:white;
border-radius:50%;
animation:bounce 1s infinite;
}

.loader div:nth-child(2){
animation-delay:.2s;
}

.loader div:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

#loading p{
margin-top:20px;
color:#94a3b8;
}

/* HEADER */

header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.3);
}

/* SEARCH */

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
max-width:600px;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}
