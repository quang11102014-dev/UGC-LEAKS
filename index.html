<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Free Limited UGC Sniper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 1. MÀN HÌNH TẢI RIÊNG BIỆT (LOADING SCREEN) */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050508;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .radar-loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            border-top-color: #00ffcc;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00ffcc;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            font-weight: bold;
        }

        /* 2. KHU VỰC HIỂN THỊ ITEM RIÊNG BIỆT */
        #mainContent {
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            padding-bottom: 20px;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            margin: 0 0 5px 0;
            font-size: 2em;
        }
        .subtitle {
            color: #8b92a5;
            font-size: 0.95em;
            margin: 0;
        }
        .ugc-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .ugc-card {
            background-color: #1a1d24;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(69, 243, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        .ugc-card:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.15);
        }
        .ugc-thumb {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: #0b0c10;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 1.15em;
            font-weight: bold;
            margin: 8px 0 4px 0;
            color: #45f3ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .creator-name {
            font-size: 0.85em;
            color: #99aab5;
            margin-bottom: 15px;
        }
        .badge-free {
            background-color: #00ffcc;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 12px;
        }
        .stock-box {
            background: #11141a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            border-left: 3px solid #ff4757;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85em;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-copy { background-color: #66fcf1; color: #0b0c10; }
        .btn-link { background-color: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; }
        .btn-link:hover { background-color: #66fcf1; color: #0b0c10; }
        
        .no-item-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2em;
            color: #8b92a5;
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <!-- 1. MÀN HÌNH TẢI RIÊNG -->
    <div id="loadingScreen">
        <div class="radar-loader"></div>
        <div class="loading-text" id="statusMessage">SCANNING ROBLOX MARKETPLACE...</div>
    </div>

    <!-- 2. CHỖ HIỂN THỊ ITEM LEAK RIÊNG -->
    <div id="mainContent">
        <header>
            <h1>FREE LIMITED UGC LEAKS</h1>
            <div class="subtitle">Live automatic marketplace radar for UGC Hunters. Refreshes every 20 seconds.</div>
        </header>
        
        <div class="ugc-container" id="ugcContainer"></div>
    </div>

    <script>
        function copyId(id) {
            navigator.clipboard.writeText(id);
            alert("Copied Asset ID: " + id);
        }

        async function scanFreeUgc() {
            const container = document.getElementById('ugcContainer');
            const loader = document.getElementById('loadingScreen');
            const content = document.getElementById('mainContent');

            try {
                // Kết nối API tìm kiếm diện rộng: Phụ kiện, Giá = 0, Thể loại Limited, Mới nhất lên đầu
                const searchUrl = 'https://roproxy.com';
                
                const response = await fetch(searchUrl);
                const result = await response.json();
                const items = result.data || [];

                // Ẩn màn hình tải riêng biệt và mở khu vực Item Showroom
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                content.style.opacity = '1';

                container.innerHTML = ''; // Làm sạch giỏ hàng cũ

                if (items.length === 0) {
                    container.innerHTML = '<p class="no-item-text">No active Free Limited UGC discovered on the market right now. System is actively monitoring...</p>';
                    return;
                }

                // Gom ID để kéo ảnh gốc hàng loạt từ hệ thống Roblox
                const itemIds = items.map(item => item.id);
                const thumbResponse = await fetch(`https://roproxy.com{itemIds.join(',')}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const thumbResult = await thumbResponse.json();
                const thumbnails = thumbResult.data || [];

                items.forEach(item => {
                    const thumbObj = thumbnails.find(t => t.targetId === item.id);
                    const imageUrl = thumbObj && thumbObj.imageUrl ? thumbObj.imageUrl : 'https://rbxcdn.com';

                    const totalStock = item.unitsValue || 'N/A';
                    const remainingStock = item.remainingStockQuantity !== undefined ? item.remainingStockQuantity : totalStock;

                    const card = document.createElement('div');
                    card.className = 'ugc-card';
                    card.innerHTML = `
                        <div>
                            <img class="ugc-thumb" src="${imageUrl}" alt="${item.name}" onerror="this.src='https://rbxcdn.com'">
                            <span class="badge-free">NEW DETECTED</span>
                            <div class="item-name" title="${item.name}">${item.name}</div>
                            <div class="creator-name">By: <strong>${item.creatorName || 'Roblox Creator'}</strong></div>
                        </div>
                        <div>
                            <div class="stock-box">
                                <div>Stocks: <strong>${remainingStock}</strong> / ${totalStock}</div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-copy" onclick="copyId(${item.id})">Copy ID</button>
                                <a class="btn btn-link" href="https://roblox.com{item.id}" target="_blank">Get Link</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Scan error:", error);
                document.getElementById('statusMessage').innerText = "CONNECTION BUSY. RETRYING IN A MOMENT...";
            }
        }

        // Kích hoạt radar quét
        scanFreeUgc();
        // Giữ chu kỳ tự động quét ngầm sau mỗi 20 giây để cập nhật vật phẩm mới lên bảng leak
        setInterval(scanFreeUgc, 20000);
    </script>
</body>
  </html>
