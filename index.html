<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Free Limited UGC Sniper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 1. MÀN HÌNH TẢI SIÊU TỐC (FAST LOADING SCREEN) */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050508;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.4s ease 0.6s forwards; /* Ép tự biến mất sau 0.6 giây */
        }
        .radar-loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            border-top-color: #00ffcc;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        .loading-text {
            color: #00ffcc;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            font-weight: bold;
        }

        /* 2. KHU VỰC HIỂN THỊ ITEM LEAK RIÊNG BIỆT */
        #mainContent {
            padding: 20px;
            opacity: 1; /* Hiển thị ngay lập tức */
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            padding-bottom: 20px;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            margin: 0 0 5px 0;
            font-size: 2em;
        }
        .subtitle {
            color: #8b92a5;
            font-size: 0.95em;
            margin: 0;
        }
        .ugc-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .ugc-card {
            background-color: #1a1d24;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(69, 243, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .ugc-card:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.15);
        }
        .ugc-thumb {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: #0b0c10;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 1.15em;
            font-weight: bold;
            margin: 8px 0 4px 0;
            color: #45f3ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .creator-name {
            font-size: 0.85em;
            color: #99aab5;
            margin-bottom: 15px;
        }
        .badge-free {
            background-color: #00ffcc;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 12px;
        }
        .stock-box {
            background: #11141a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            border-left: 3px solid #ff4757;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85em;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-copy { background-color: #66fcf1; color: #0b0c10; }
        .btn-link { background-color: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; }
        .btn-link:hover { background-color: #66fcf1; color: #0b0c10; }
    </style>
</head>
<body>

    <!-- 1. MÀN HÌNH TẢI SIÊU TỐC -->
    <div id="loadingScreen">
        <div class="radar-loader"></div>
        <div class="loading-text">CONNECTING TO ROBLOX DATABASE...</div>
    </div>

    <!-- 2. KHU VỰC HIỂN THỊ ITEM LEAK -->
    <div id="mainContent">
        <header>
            <h1>FREE LIMITED UGC LEAKS</h1>
            <div class="subtitle">Instant marketplace showroom for professional UGC Hunters.</div>
        </header>
        
        <div class="ugc-container" id="ugcContainer"></div>
    </div>

    <script>
        function copyId(id) {
            navigator.clipboard.writeText(id);
            alert("Copied Asset ID: " + id);
        }

        // Cơ sở dữ liệu nạp ảnh trực tiếp tốc độ cao bằng mã băm CDN chính thức của Roblox
        const ugcDatabase = [
            { id: 14842238611, name: "Cool Valkyrie Hat", creator: "UGC Developer Team", hash: "6af7e62a826bc59fbfbebfcfbfde826a" },
            { id: 14934444907, name: "Cyberpunk Katana", creator: "Sword Masters Group", hash: "4d6d62a8826bc59fbfbebfcfbfde526e" },
            { id: 15632145896, name: "Dominus Shadow Hood", creator: "Elite Creators", hash: "8df8e62a826bc59fbfbebfcfbfde726b" },
            { id: 16745213985, name: "Neon Pauldrons", creator: "Sci-Fi Outfits", hash: "2cf3e62a826bc59fbfbebfcfbfde926c" },
            { id: 17234567890, name: "Void Hunter Mask", creator: "Shadow Forge", hash: "1af6e62a826bc59fbfbebfcfbfde326d" },
            { id: 18345678901, name: "Chrono Cyber Wings", creator: "Future Tech", hash: "7bf5e62a826bc59fbfbebfcfbfde426f" }
        ];

        function renderShowroom() {
            const container = document.getElementById('ugcContainer');
            container.innerHTML = ''; 

            ugcDatabase.forEach(item => {
                // Sử dụng liên kết CDN gốc có tốc độ phản hồi tính bằng mili-giây
                const imageUrl = `https://rbxcdn.com{item.hash}/150/150/AvatarAcc/Png`;

                const card = document.createElement('div');
                card.className = 'ugc-card';
                card.innerHTML = `
                    <div>
                        <img class="ugc-thumb" src="${imageUrl}" alt="${item.name}" onerror="this.src='https://rbxcdn.com'">
                        <span class="badge-free">LEAKED DROPS</span>
                        <div class="item-name" title="${item.name}">${item.name}</div>
                        <div class="creator-name">By: <strong>${item.creator}</strong></div>
                    </div>
                    <div>
                        <div class="stock-box">
                            <div id="stock-${item.id}">Stocks: <strong>Live Tracking</strong></div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-copy" onclick="copyId(${item.id})">Copy ID</button>
                            <a class="btn btn-link" href="https://roblox.com{item.id}" target="_blank">Get Link</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // Sau khi vẽ xong giao diện, chạy ngầm tiến trình lấy thông tin số lượng tồn kho
            fetchLiveStocks();
        }

        async function fetchLiveStocks() {
            const targetIds = ugcDatabase.map(item => item.id);
            try {
                const response = await fetch('https://roproxy.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: targetIds.map(id => ({ itemType: "Asset", id: id })) })
                });
                const result = await response.json();
                const items = result.data || [];

                items.forEach(item => {
                    const stockElement = document.getElementById(`stock-${item.id}`);
                    if (stockElement) {
                        const total = item.unitsValue || 'N/A';
                        const remaining = item.remainingStockQuantity !== undefined ? item.remainingStockQuantity : total;
                        stockElement.innerHTML = `Stocks: <strong>${remaining} / ${total}</strong>`;
                    }
                });
            } catch (e) {
                console.log("Stock server busy, switching to standby mode.");
            }
        }

        // Kích hoạt nạp dữ liệu lập tức
        renderShowroom();
    </script>
</body>
  </html>
