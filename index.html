<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox UGC Item Tracker</title>
    <style>
        /* Định dạng giao diện cơ bản */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #191b1f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00a2ff;
        }
        /* Bố cục lưới hiển thị danh sách vật phẩm */
        .ugc-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }
        /* Định dạng từng thẻ vật phẩm */
        .ugc-card {
            background-color: #23272a;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #36393f;
            transition: transform 0.2s;
        }
        .ugc-card:hover {
            transform: translateY(-5px);
        }
        .ugc-thumb {
            width: 150px;
            height: 150px;
            object-fit: contain;
            background-color: #2f3136;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .item-name {
            font-size: 1.1em;
            font-weight: bold;
            margin: 10px 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .creator-name {
            font-size: 0.9em;
            color: #b9bbbe;
            margin-bottom: 10px;
        }
        .stock-info {
            display: inline-block;
            background-color: #ff4757;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            font-size: 1.2em;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Hệ Thống Theo Dõi Vật Phẩm Roblox UGC</h1>
    
    <div id="loading" class="loading">Đang tải dữ liệu vật phẩm từ Roblox...</div>
    <div class="ugc-container" id="ugcContainer"></div>

    <script>
        // Danh sách ID các vật phẩm UGC mẫu bạn muốn hiển thị trên web
        const itemIds =; 

        // Hàm lấy thông tin chi tiết của vật phẩm từ API Roblox
        async function fetchItemDetails(ids) {
            try {
                const response = await fetch('https://roproxy.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: ids.map(id => ({ itemType: "Asset", id: id }))
                    })
                });
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error("Lỗi khi tải chi tiết vật phẩm:", error);
                return [];
            }
        }

        // Hàm lấy ảnh thumbnail của vật phẩm dựa trên Asset ID
        async function fetchItemThumbnails(ids) {
            try {
                const response = await fetch(`https://roproxy.com{ids.join(',')}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error("Lỗi khi tải ảnh vật phẩm:", error);
                return [];
            }
        }

        // Hàm khởi tạo và kết hợp dữ liệu để hiển thị lên giao diện
        async function initUgcTracker() {
            const container = document.getElementById('ugcContainer');
            const loadingText = document.getElementById('loading');

            // 1. Gọi API lấy thông tin chữ và thông tin ảnh song song
            const [items, thumbnails] = await Promise.all([
                fetchItemDetails(itemIds),
                fetchItemThumbnails(itemIds)
            ]);

            // Ẩn dòng chữ đang tải
            loadingText.style.display = 'none';

            if (items.length === 0) {
                container.innerHTML = '<p class="loading">Không thể tải dữ liệu. Vui lòng thử lại sau.</p>';
                return;
            }

            // 2. Duyệt qua từng vật phẩm để tạo thẻ HTML
            items.forEach(item => {
                // Tìm ảnh tương ứng với vật phẩm này
                const thumbObj = thumbnails.find(t => t.targetId === item.id);
                const imageUrl = thumbObj ? thumbObj.imageUrl : 'https://placeholder.com';

                // Xử lý thông tin Stock (Số lượng giới hạn còn lại nếu có)
                const totalStock = item.unitsValue || 'N/A';
                const remainingStock = item.remainingStockQuantity !== undefined ? item.remainingStockQuantity : totalStock;

                // Tạo cấu trúc thẻ HTML
                const card = document.createElement('div');
                card.className = 'ugc-card';
                card.innerHTML = `
                    <img class="ugc-thumb" src="${imageUrl}" alt="${item.name}">
                    <div class="item-name" title="${item.name}">${item.name}</div>
                    <div class="creator-name">Bởi: <strong>${item.creatorName}</strong> (${item.creatorType})</div>
                    <div class="stock-info">Stocks còn lại: ${remainingStock} / ${totalStock}</div>
                `;

                container.appendChild(card);
            });
        }

        // Chạy ứng dụng khi trang web tải xong
        initUgcTracker();
    </script>
</body>
</html>
