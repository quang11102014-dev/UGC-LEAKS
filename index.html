<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGC Free Limited Tracker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

#loading{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:7px solid #334155;
border-top:7px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-top:15px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

header{
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
background:#111827;
border-bottom:1px solid #374151;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
margin-bottom:10px;
}

.info p{
margin-bottom:6px;
font-size:14px;
}

.btn{
display:inline-block;
padding:8px 12px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:8px;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
padding:25px;
}

.page-btn{
padding:10px 15px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div id="loading">
<h1>Loading UGC Tracker...</h1>
<div class="spinner"></div>
</div>

<header>
UGC FREE LIMITED TRACKER
</header>

<div class="grid" id="grid"></div>

<div class="pagination">
<button class="page-btn" onclick="prevPage()">Previous</button>
<span id="page">1</span>
<button class="page-btn" onclick="nextPage()">Next</button>
</div>

<script>

const ugcData = [];

for(let i=1;i<=120;i++){
ugcData.push({
id:100000+i,
name:"Free Limited Item "+i,
creator:i%2===0?"Cool Group":"UGC Creator",
image:"https://picsum.photos/400/400?random="+i
});
}

let currentPage=1;
const itemsPerPage=12;

function renderPage(){

const start=(currentPage-1)*itemsPerPage;
const end=start+itemsPerPage;

const pageItems=ugcData.slice(start,end);

const grid=document.getElementById("grid");

grid.innerHTML=pageItems.map(item=>`
<div class="card">
<img src="${item.image}">
<div class="info">
<h3>${item.name}</h3>
<p><b>ID:</b> ${item.id}</p>
<p><b>Creator:</b> ${item.creator}</p>

<button class="btn"
onclick="navigator.clipboard.writeText('${item.id}')">
Copy ID
</button>

</div>
</div>
`).join("");

document.getElementById("page").textContent=currentPage;
}
