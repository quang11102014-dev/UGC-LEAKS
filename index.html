<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Free Limited UGC Sniper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 1. MÀN HÌNH TẢI RIÊNG BIỆT (LOADING SCREEN) */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050508;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .radar-loader {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            border-top-color: #00ffcc;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00ffcc;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            font-weight: bold;
        }

        /* 2. KHU VỰC HIỂN THỊ ITEM LEAK RIÊNG BIỆT */
        #mainContent {
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            padding-bottom: 20px;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            margin: 0 0 5px 0;
            font-size: 2em;
        }
        .subtitle {
            color: #8b92a5;
            font-size: 0.95em;
            margin: 0;
        }
        .ugc-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .ugc-card {
            background-color: #1a1d24;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(69, 243, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        .ugc-card:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.15);
        }
        .ugc-thumb {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: #0b0c10;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 1.15em;
            font-weight: bold;
            margin: 8px 0 4px 0;
            color: #45f3ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .creator-name {
            font-size: 0.85em;
            color: #99aab5;
            margin-bottom: 15px;
        }
        .badge-free {
            background-color: #00ffcc;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 12px;
        }
        .stock-box {
            background: #11141a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            border-left: 3px solid #ff4757;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85em;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-copy { background-color: #66fcf1; color: #0b0c10; }
        .btn-link { background-color: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; }
        .btn-link:hover { background-color: #66fcf1; color: #0b0c10; }
    </style>
</head>
<body>

    <!-- 1. MÀN HÌNH TẢI RIÊNG BIỆT -->
    <div id="loadingScreen">
        <div class="radar-loader"></div>
        <div class="loading-text">LOADING UGC LEAKS DATABASE...</div>
    </div>

    <!-- 2. KHU VỰC HIỂN THỊ ITEM LEAK RIÊNG BIỆT -->
    <div id="mainContent">
        <header>
            <h1>FREE LIMITED UGC LEAKS</h1>
            <div class="subtitle">Live database for professional UGC Hunters. All items are 100% Leaked.</div>
        </header>
        
        <div class="ugc-container" id="ugcContainer"></div>
    </div>

    <script>
        function copyId(id) {
            navigator.clipboard.writeText(id);
            alert("Copied Asset ID: " + id);
        }

        // 🌟 CHỖ ĐỂ BẠN THAY ID VẬT PHẨM (Tôi đã ghim sẵn 6 ID đồ Free Limited hot cho bạn)
        const targetIds =;

        async function scanFreeUgc() {
            const container = document.getElementById('ugcContainer');
            const loader = document.getElementById('loadingScreen');
            const content = document.getElementById('mainContent');

            // 1. Tắt màn hình chờ sau khi khởi động để hiện showroom ngay lập tức
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
                content.style.opacity = '1';
            }, 800); // 0.8 giây hiệu ứng radar cho ngầu

            container.innerHTML = ''; // Làm sạch khu vực hiển thị

            try {
                // 2. Đồng bộ kết nối lấy ảnh gốc từ Roblox Server
                const thumbResponse = await fetch(`https://roproxy.com{targetIds.join(',')}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const thumbResult = await thumbResponse.json();
                const thumbnails = thumbResult.data || [];

                // 3. Render danh sách vật phẩm leak ra ngoài màn hình
                targetIds.forEach((id, index) => {
                    const thumbObj = thumbnails.find(t => t.targetId === id);
                    const imageUrl = thumbObj && thumbObj.imageUrl ? thumbObj.imageUrl : 'https://rbxcdn.com';

                    createCardElement(container, id, imageUrl, index);
                });

            } catch (error) {
                console.error("Connection slow:", error);
                // 4. Chế độ dự phòng thông minh: Nếu sập mạng proxy, vẫn hiện đồ kèm ảnh logo khối Roblox rất đẹp
                targetIds.forEach((id, index) => {
                    createCardElement(container, id, 'https://rbxcdn.com', index);
                });
            }
        }

        // Hàm xử lý xuất giao diện thẻ item leak ra ngoài
        function createCardElement(container, id, img, index) {
            const card = document.createElement('div');
            card.className = 'ugc-card';
            card.innerHTML = `
                <div>
                    <img class="ugc-thumb" src="${img}" alt="Roblox UGC Item" onerror="this.src='https://rbxcdn.com'">
                    <span class="badge-free">LEAKED DROPS</span>
                    <div class="item-name">UGC Limited Item #${index + 1}</div>
                    <div class="creator-name">By: <strong>UGC Developer Team</strong></div>
                </div>
                <div>
                    <div class="stock-box">
                        <div>Stocks: <strong>Live Tracking</strong></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-copy" onclick="copyId(${id})">Copy ID</button>
                        <a class="btn btn-link" href="https://roblox.com{id}" target="_blank">Get Link</a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // Chạy radar khởi tạo
        scanFreeUgc();
    </script>
</body>
  </html>
